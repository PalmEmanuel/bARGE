name: Generate README GIFs

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to record (leave empty to record all)'
        required: false
        default: ''
        type: string
      gif_fps:
        description: 'GIF frames per second'
        required: false
        default: '10'
        type: string
      gif_width:
        description: 'GIF output width in pixels'
        required: false
        default: '800'
        type: string

env:
  NODE_VERSION: '22'

jobs:
  record-gifs:
    name: Record GIFs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package extension
        run: |
          npm run package
          npm install -g @vscode/vsce
          vsce package --no-yarn

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            xdotool \
            ffmpeg \
            libasound2 \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6

      - name: Install VS Code
        run: |
          wget -q "https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64" \
            -O /tmp/vscode.deb
          sudo dpkg -i /tmp/vscode.deb || sudo apt-get install -f -y

      - name: Make recording script executable
        run: chmod +x scripts/record-gifs/record.sh

      - name: Record GIFs
        env:
          GIF_FPS: ${{ inputs.gif_fps }}
          GIF_WIDTH: ${{ inputs.gif_width }}
        run: |
          if [[ -n "${{ inputs.scenario }}" ]]; then
            ./scripts/record-gifs/record.sh "${{ inputs.scenario }}"
          else
            ./scripts/record-gifs/record.sh
          fi

      - name: Upload GIFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: readme-gifs
          path: media/readme/gifs/*.gif
          retention-days: 30

      - name: Commit updated GIFs
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/readme/gifs/*.gif
          if git diff --cached --quiet; then
            echo "No GIF changes to commit."
          else
            git commit -m "chore(dev): Update README GIFs [skip ci]"
            git push
          fi
