name: Generate README GIFs

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to record (leave empty to record all)'
        required: false
        default: ''
        type: string
      gif_fps:
        description: 'GIF frames per second'
        required: false
        default: '10'
        type: string
      gif_width:
        description: 'GIF output width in pixels'
        required: false
        default: '1920'
        type: string

concurrency:
  group: generate-gifs
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  record-gifs:
    name: Record GIFs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build and package extension
        run: |
          npm run package
          npm install -g @vscode/vsce
          vsce package --no-yarn

      - name: Cache apt package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/apt-archives
          key: apt-v1-${{ runner.os }}-${{ hashFiles('.github/workflows/generate-readme-gifs.yml') }}

      - name: Install system dependencies
        run: |
          # Seed apt archive with any previously cached debs to skip downloads
          if find ~/.cache/apt-archives -maxdepth 1 -name '*.deb' 2>/dev/null | grep -q .; then
            sudo cp ~/.cache/apt-archives/*.deb /var/cache/apt/archives/
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb xdotool ffmpeg imagemagick x11-apps \
            libasound2t64 libgbm1 libgtk-3-0t64 libnss3 libxss1 libxtst6 \
            gnome-keyring libsecret-tools python3-cryptography dbus-x11
          # Save newly downloaded debs for the next run
          mkdir -p ~/.cache/apt-archives
          find /var/cache/apt/archives -maxdepth 1 -name '*.deb' \
            -exec cp -n {} ~/.cache/apt-archives/ \;

      - name: Cache Posy cursor theme
        uses: actions/cache@v4
        id: cursor-cache
        with:
          path: /usr/share/icons/Posy_Cursor
          key: posy-cursor-v1

      - name: Install Posy cursor theme
        if: steps.cursor-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/simtrami/posy-improved-cursor-linux/archive/refs/heads/main.tar.gz" \
            | tar -xz -C /tmp
          sudo mkdir -p /usr/share/icons
          sudo cp -r "/tmp/posy-improved-cursor-linux-main/Posy_Cursor" /usr/share/icons/Posy_Cursor

      - name: Cache VS Code
        uses: actions/cache@v4
        id: vscode-cache
        with:
          path: /tmp/vscode.deb
          key: vscode-stable-deb-v1

      - name: Download VS Code
        if: steps.vscode-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64" \
            -O /tmp/vscode.deb

      - name: Install VS Code
        run: sudo dpkg -i /tmp/vscode.deb || sudo apt-get install -f -y

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_ACCESS_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Setup Copilot Chat keyring
        if: inputs.scenario == 'copilot-chat' || inputs.scenario == ''
        run: |
          # Start a D-Bus session so gnome-keyring can run headless
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}" >> $GITHUB_ENV
          echo "DBUS_SESSION_BUS_PID=${DBUS_SESSION_BUS_PID}" >> $GITHUB_ENV

          # Start gnome-keyring with a known fixed password
          eval $(printf "barge-gif-key\n" | gnome-keyring-daemon \
            --unlock --components=secrets --daemonize 2>/dev/null)
          echo "GNOME_KEYRING_CONTROL=${GNOME_KEYRING_CONTROL}" >> $GITHUB_ENV
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> $GITHUB_ENV

          # Store the fixed password as "Code Safe Storage" — VS Code reads this
          # via libsecret to derive the AES key for decrypting state.vscdb secrets
          printf "barge-gif-key" | secret-tool store \
            --label="Code Safe Storage" \
            service "Code Safe Storage" \
            account "Code"

      - name: Make recording script executable
        run: chmod +x scripts/record-gifs/record.sh

      - name: Record GIFs
        env:
          GIF_FPS: ${{ inputs.gif_fps }}
          GIF_WIDTH: ${{ inputs.gif_width }}
          GH_COPILOT_CHAT: ${{ secrets.GH_COPILOT_CHAT }}
        run: |
          if [[ -n "${{ inputs.scenario }}" ]]; then
            ./scripts/record-gifs/record.sh "${{ inputs.scenario }}"
          else
            ./scripts/record-gifs/record.sh
          fi

      - name: Upload GIFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: readme-gifs
          path: media/readme/gifs/*.gif
          retention-days: 30

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/barge-debug/
          retention-days: 3
          if-no-files-found: ignore

